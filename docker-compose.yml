services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: school_system
      MYSQL_ROOT_PASSWORD: root
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10
    ports:
      - "3306:3306"
  app:
    image: app-backend
    build: .
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRINGBOOT_DATASOURCE_URL: jdbc:mysql:db:8080/api/school_system
      SPRINGBOOT_DATASOURCE_USERAME: root
      SPRINGBOOT_DATASOURCE_PASSWORD: root